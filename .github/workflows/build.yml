              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')
          print("Icons generated successfully")
          PYEOF

      - name: Create Gradle Wrapper
        run: |
          sudo apt-get update -q && sudo apt-get install -y gradle
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated successfully"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs "$APK_PATH"
          else
              echo "❌ Release APK not found"
              exit 1
          fi

      - name: Bundle release
        run: |
          mkdir -p J2ME-Emulator-release/.github/workflows
          cp app/build/outputs/apk/release/app-release.apk J2ME-Emulator-release/J2ME-Emulator.apk
          cp EmulatorApp.kt J2ME-Emulator-release/
          cp .github/workflows/build.yml J2ME-Emulator-release/.github/workflows/
          
          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-release.apk | awk '{print $5}')
          
          cat > J2ME-Emulator-release/BUILD_INFO.txt << EOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (dummy keys)
          APK Size:   $APK_SIZE
          Features:   J2ME Emulation + Game Memory Hacking
          Optimized:  Yes (R8 + resource shrinking)
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2ME-Emulator-${{ github.run_number }}
          path: J2ME-Emulator-release/
          retention-days: 30
