        uses: actions/upload-artifact@v4
        with:
          name: J2ME-Emulator-${{ github.run_number }}
          path: J2ME-Emulator-release/
          retention-days: 30          
              ssize_t bytes = process_vm_writev(getpid(), &local_iov, 1, &remote_iov, 1, 0);
              
              return (bytes == size) ? JNI_TRUE : JNI_FALSE;
          }

          extern "C" JNIEXPORT jlong JNICALL
