              process_vm_readv(getpid(), &local_iov, 1, &remote_iov, 1, 0);
              return value;
          }
          CPPEOF

          cat > app/src/main/cpp/jni_bridge.cpp << 'CPPEOF'
          #include <jni.h>

          JNIEXPORT jint JNICALL JNI_OnLoad(JavaVM* vm, void* reserved) {
