      - name: Generate dummy keystore
        run: |
          keytool -genkey -v \
            -keystore app/dummy.keystore \
            -alias dummy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=Dummy, OU=J2ME, O=Emulator, L=Test, S=Test, C=US"

      - name: Generate launcher icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size):
              img = Image.new('RGBA', (size, size), (10, 10, 26, 255))
              d = ImageDraw.Draw(img)
              # Draw game console icon
              margin = size // 8
              d.rounded_rectangle([margin, margin*2, size-margin, size-margin*2], 
                                radius=size//10, outline=(233, 69, 96, 255), width=max(2, size//30))
              # Screen
              screen_margin = margin*2
              d.rectangle([screen_margin, margin*3, size-screen_margin, size-margin*4],
                         fill=(26, 26, 46, 255))
              return img

          for density, s in {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96,
                              'xxhdpi': 144, 'xxxhdpi': 192}.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')
          print("Icons done.")
          PYEOF

      - name: Create Gradle Wrapper
        run: |
          sudo apt-get update -q && sudo apt-get install -y gradle
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
